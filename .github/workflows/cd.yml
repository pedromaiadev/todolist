name: CD - Deploy (Release)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Gerar Release
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes antes do deploy
        run: |
          pytest tests/ -v

      - name: Empacotar aplicação
        run: |
          mkdir -p release
          cp todo.py release/
          cp requirements.txt release/
          cp README.md release/
          zip -r todo-list-app.zip release/

      - name: Fazer upload do artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-list-app
          path: todo-list-app.zip
          retention-days: 7

      - name: Exibir mensagem de deploy
        run: |
          echo "✅ Deploy realizado com sucesso!"
          echo "📦 Artifact gerado: todo-list-app.zip"
          echo "🕐 Data/hora: $(date)"
