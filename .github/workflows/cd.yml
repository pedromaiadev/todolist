name: CD - Continuous Delivery

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    name: Rodar Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Rodar testes antes do deploy
        run: |
          pytest testtodo.py -v

  deploy:
    name: Build e Push no DockerHub
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/todolist-app:latest

      - name: Exibir mensagem de deploy
        run: |
          echo "✅ Deploy realizado com sucesso!"
          echo "🐳 Imagem publicada no DockerHub!"
          echo "📦 ${{ secrets.DOCKERHUB_USERNAME }}/todolist-app:latest"
          echo "🕐 Data/hora: $(date)"